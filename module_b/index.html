<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tic-Tac-Toe AI</h1>

<div id="ticTacToeSection">

    <label for="algorithmSelect">Algorithm:</label>

    <select id="algorithmSelect">
        <option value="minimax">Minimax</option>
        <option value="alphabeta">Alpha-Beta</option>
    </select>

    <label for="gameMode">Mode:</label>

    <select id="gameMode">
        <option value="human">Human vs AI</option>
        <option value="ai">AI vs AI</option>
    </select>

    <button id="startAiGameBtn">
        Start AI vs AI
    </button>

    <div id="metrics">

        <p>Decision Time: <span id="decisionTime">0</span> ms</p>

        <p>Nodes Explored: <span id="nodesExplored">0</span></p>

        <p>Pruning Rate: <span id="pruningRate">0</span>%</p>

    </div>

    <div id="board"></div>

    <button id="restartBtn">Restart Game</button>

</div>

<script src="minimax.js"></script>
<script src="alphabeta.js"></script>
<script src="tictactoe.js"></script>

</body>
</html>
